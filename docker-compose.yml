version: "3.9"

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: chainpulse
      POSTGRES_USER: chainpulse
      POSTGRES_PASSWORD: chainpulse123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./chainpulse-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NEWS_API_KEY: ${NEWS_API_KEY}
      OPENROUTE_API_KEY: ${OPENROUTE_API_KEY}
      DEBUG: ${DEBUG}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./chainpulse-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data: